<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Môj Lokálny AI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #0f0f0f;
      color: #eee;
    }
    h1 {
      text-align: center;
      color: #00ccff;
    }
    #chat-container {
      max-width: 900px;
      margin: 30px auto;
      background: #1a1a1a;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      overflow: hidden;
      height: 85vh;
      display: flex;
      flex-direction: column;
    }
    #chat-box {
      flex: 1;
      padding: 25px;
      overflow-y: auto;
    }
    .message {
      margin: 15px 0;
      padding: 15px 20px;
      border-radius: 20px;
      max-width: 82%;
      line-height: 1.5;
    }
    .user {
      background: #007bff;
      color: white;
      align-self: flex-end;
      margin-left: auto;
    }
    .assistant {
      background: #2a2a2a;
      color: #ddd;
      align-self: flex-start;
    }
    #input-area {
      padding: 20px;
      background: #222;
      border-top: 1px solid #333;
      display: flex;
      gap: 12px;
    }
    #user-input {
      flex: 1;
      padding: 16px 20px;
      border: none;
      border-radius: 30px;
      background: #333;
      color: white;
      font-size: 17px;
    }
    #send-btn {
      padding: 16px 32px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
    }
    .thinking { color: #888; font-style: italic; }
  </style>
</head>
<body>

  <h1>🤖 Môj Lokálny AI</h1>

  <div id="chat-container">
    <div id="chat-box"></div>
    
    <div id="input-area">
      <input type="text" id="user-input" placeholder="Napíš správu..." autocomplete="off">
      <button id="send-btn">Odoslať</button>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    // === Tvoja nová URL ===
    const API = "https://attempting-opera-seq-dishes.trycloudflare.com/";
  
    let conversationHistory = [];

    function addMessage(role, content) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${role}`;
      msgDiv.textContent = content;
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
      const message = userInput.value.trim();
      if (!message) return;

      addMessage('user', message);
      conversationHistory.push({ role: "user", content: message });
      userInput.value = '';

      const thinkingDiv = document.createElement('div');
      thinkingDiv.className = "message assistant thinking";
      thinkingDiv.textContent = "Premýšľa...";
      chatBox.appendChild(thinkingDiv);
      chatBox.scrollTop = chatBox.scrollHeight;

      try {
        const res = await fetch(`${OLLAMA_URL}/api/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "qwen3:14b",        // môžeš zmeniť na "qwen3:8b" ak je pomalý
            messages: conversationHistory,
            stream: true,
            temperature: 0.75,
            num_ctx: 8192
          })
        });

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let responseText = "";

        thinkingDiv.classList.remove("thinking");
        thinkingDiv.textContent = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value);
          const lines = chunk.split("\n");

          for (const line of lines) {
            if (!line.trim()) continue;
            try {
              const data = JSON.parse(line);
              if (data.message?.content) {
                responseText += data.message.content;
                thinkingDiv.textContent = responseText;
                chatBox.scrollTop = chatBox.scrollHeight;
              }
            } catch(e) {}
          }
        }

        conversationHistory.push({ role: "assistant", content: responseText });

      } catch (err) {
        thinkingDiv.textContent = "❌ Chyba spojenia.\nSkontroluj:\n1. Ollama beží doma\n2. Cloudflare Tunnel je spustený\n3. Model je stiahnutý (qwen3:14b)";
      }
    }

    userInput.addEventListener("keypress", e => { if (e.key === "Enter") sendMessage(); });
    sendBtn.addEventListener("click", sendMessage);

    addMessage("assistant", "Ahoj! Som tvoj lokálny AI (beží na tvojom PC).\nAko ti môžem pomôcť?");
  </script>

</body>
</html>
