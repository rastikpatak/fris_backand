<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Môj Lokálny AI</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #0f0f0f;
      color: #eee;
    }
    #chat-container {
      width: 100%;
      max-width: 850px;
      margin: 30px auto;
      background: #1a1a1a;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      overflow: hidden;
      height: 90vh;
      display: flex;
      flex-direction: column;
    }
    #chat-box {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      background: #1a1a1a;
    }
    .message {
      margin: 15px 0;
      padding: 14px 18px;
      border-radius: 18px;
      max-width: 85%;
      line-height: 1.5;
    }
    .user {
      background: #007bff;
      color: white;
      align-self: flex-end;
      margin-left: auto;
    }
    .assistant {
      background: #2a2a2a;
      color: #ddd;
      align-self: flex-start;
    }
    #input-area {
      padding: 16px;
      background: #222;
      border-top: 1px solid #333;
      display: flex;
      gap: 10px;
    }
    #user-input {
      flex: 1;
      padding: 14px 20px;
      border: none;
      border-radius: 30px;
      background: #333;
      color: white;
      font-size: 16px;
    }
    #send-btn {
      padding: 14px 28px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
    }
    .thinking { color: #888; font-style: italic; }
  </style>
</head>
<body>

  <div id="chat-container">
    <div id="chat-box"></div>
    
    <div id="input-area">
      <input type="text" id="user-input" placeholder="Napíš správu..." autocomplete="off">
      <button id="send-btn">Odoslať</button>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    // Tvoja aktuálna Cloudflare URL
    const OLLAMA_URL = "https://eagle-sullivan-comfort-three.trycloudflare.com";

    let conversationHistory = [];

    function addMessage(role, content) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${role}`;
      msgDiv.textContent = content;
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
      const message = userInput.value.trim();
      if (!message) return;

      addMessage('user', message);
      conversationHistory.push({ role: "user", content: message });
      userInput.value = '';

      const assistantDiv = document.createElement('div');
      assistantDiv.className = "message assistant thinking";
      assistantDiv.textContent = "Premýšľa...";
      chatBox.appendChild(assistantDiv);
      chatBox.scrollTop = chatBox.scrollHeight;

      try {
        const response = await fetch(`${OLLAMA_URL}/api/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: "qwen3:14b",        // zmeň na qwen3:8b ak chceš rýchlejší
            messages: conversationHistory,
            stream: true,
            temperature: 0.7
          })
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let assistantMessage = "";

        assistantDiv.classList.remove('thinking');
        assistantDiv.textContent = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value);
          const lines = chunk.split('\n');

          for (const line of lines) {
            if (line.trim() === '') continue;
            try {
              const data = JSON.parse(line);
              if (data.message?.content) {
                assistantMessage += data.message.content;
                assistantDiv.textContent = assistantMessage;
                chatBox.scrollTop = chatBox.scrollHeight;
              }
            } catch (e) {}
          }
        }

        conversationHistory.push({ role: "assistant", content: assistantMessage });

      } catch (error) {
        assistantDiv.textContent = "Chyba: Skontroluj, či Ollama beží a Cloudflare Tunnel je aktívny.";
      }
    }

    // Odoslanie Enterom
    userInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
    sendBtn.addEventListener('click', sendMessage);

    // Úvodná správa
    addMessage('assistant', 'Ahoj! Som tvoj lokálny AI. Ako ti môžem pomôcť?');
  </script>

</body>
</html>
