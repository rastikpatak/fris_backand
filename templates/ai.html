<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Môj Lokálny AI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #0f0f0f;
      color: #eee;
    }
    h1 {
      text-align: center;
      color: #00ccff;
    }
    #chat-container {
      max-width: 900px;
      margin: 30px auto;
      background: #1a1a1a;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      overflow: hidden;
      height: 85vh;
      display: flex;
      flex-direction: column;
    }
    #chat-box {
      flex: 1;
      padding: 25px;
      overflow-y: auto;
    }
    .message {
      margin: 15px 0;
      padding: 15px 20px;
      border-radius: 20px;
      max-width: 82%;
      line-height: 1.5;
    }
    .user {
      background: #007bff;
      color: white;
      align-self: flex-end;
      margin-left: auto;
    }
    .assistant {
      background: #2a2a2a;
      color: #ddd;
      align-self: flex-start;
    }
    #input-area {
      padding: 20px;
      background: #222;
      border-top: 1px solid #333;
      display: flex;
      gap: 12px;
    }
    #user-input {
      flex: 1;
      padding: 16px 20px;
      border: none;
      border-radius: 30px;
      background: #333;
      color: white;
      font-size: 17px;
    }
    #send-btn {
      padding: 16px 32px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
    }
    .thinking { color: #888; font-style: italic; }
  </style>
</head>
<body>

  <h1>🤖 Môj Lokálny AI</h1>

  <div id="chat-container">
    <div id="chat-box"></div>
    
    <div id="input-area">
      <input type="text" id="user-input" placeholder="Napíš správu..." autocomplete="off">
      <button id="send-btn">Odoslať</button>
    </div>
  </div>

  <script>
<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    // ✅ DÔLEŽITÉ: Voláme tvoj Flask backend, nie priamo Cloudflare.
    // Keďže HTML a Flask bežia na tom istom hostingu (Render), stačí "/chat"
    const BACKEND_URL = "/chat"; 

    let conversationHistory = [];

    // Funkcia na pridanie správy do okna
    function addMessage(role, content) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        msgDiv.textContent = content;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        return msgDiv;
    }

    async function sendMessage() {
        const message = userInput.value.trim();
        if (!message) return;

        // 1. Pridáme správu užívateľa do UI a histórie
        addMessage('user', message);
        conversationHistory.push({ role: "user", content: message });
        userInput.value = '';

        // 2. Vytvoríme "bublinu" pre odpoveď asistenta
        const assistantMsgDiv = addMessage('assistant', '...');
        assistantMsgDiv.classList.add('thinking');
        assistantMsgDiv.textContent = "Premýšľa...";

        try {
            // 3. Pošleme požiadavku na náš Flask backend
            const response = await fetch(BACKEND_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "qwen3:14b", // Uisti sa, že tento model máš stiahnutý
                    messages: conversationHistory,
                    stream: true
                })
            });

            if (!response.ok) throw new Error("Backend neodpovedá správne.");

            // 4. Spracovanie STREAMU (postupné písanie)
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullAiResponse = "";

            assistantMsgDiv.classList.remove('thinking');
            assistantMsgDiv.textContent = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value, { stream: true });
                
                // Flask posiela čistý text, tak ho rovno pridávame
                fullAiResponse += chunk;
                assistantMsgDiv.textContent = fullAiResponse;
                chatBox.scrollTop = chatBox.scrollHeight;
            }

            // 5. Uložíme finálnu odpoveď do histórie pre kontext
            conversationHistory.push({ role: "assistant", content: fullAiResponse });

        } catch (err) {
            console.error("Chyba:", err);
            assistantMsgDiv.classList.remove('thinking');
            assistantMsgDiv.textContent = "❌ Chyba: Nepodarilo sa spojiť s AI. Skontroluj, či ti beží Cloudflare Tunnel a Ollama.";
        }
    }

    // Event listenery
    sendBtn.addEventListener("click", sendMessage);
    userInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
    });

    // Úvodná správa
    addMessage("assistant", "Ahoj! Som tvoj lokálny AI. Ako ti môžem dnes pomôcť?");
</script>
  </script>

</body>
</html>
