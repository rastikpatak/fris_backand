<html>  
    <head> 
        <title> title </title>

    </head>
    <body>
        <h1>nieco</h1>
        <p>text</p>
        <div id="mojd"></div>

        <script type="text/javascript">
  const mojd = document.getElementById("mojd");

  mojd.style.display = "grid";
  mojd.style.gridTemplateColumns = "repeat(4, 1fr)";
  mojd.style.gap = "20px";
  mojd.style.justifyItems = "center";

  fetch("/students")
    .then((response) => response.json())
    .then((students) => {
      console.log(students);

      if (!Array.isArray(students)) {
        console.error("Odpoveď nie je pole:", students);
        return;
      }

      students.forEach((student) => {
        const img = document.createElement("img");

        img.src = student.img && student.img.trim() !== ""
          ? student.img
          : "https://via.placeholder.com/200x220?text=No+Image";

        img.width = 200;
        img.height = 220;
        img.style.objectFit = "cover";
        img.style.borderRadius = "10px";

        mojd.appendChild(img);
      });
    })
    .catch((err) => console.error("CHYBA:", err));

        </script> 

    </body>
</html>
