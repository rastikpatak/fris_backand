<html>  
    <head> 
        <title>Students</title>
    </head>
    <body>
        <h1>Students</h1>
        <div id="mojd"></div>
        <script>
            const mojd = document.getElementById("mojd")
            mojd.style.display = "grid"
            mojd.style.gridTemplateColumns = "repeat(4, 1fr)"
            mojd.style.gap = "20px"
            mojd.style.justifyItems = "center"

            fetch("/students")
                .then((res) => res.json())
                .then((odpoved) => {
                    console.log(odpoved)
                    odpoved.forEach((student) => {
                        const drinkImg = document.createElement("img")
                        if (student.img && student.img.trim() !== "") {
                            drinkImg.src = student.img
                        } else {
                            drinkImg.src = "https://placehold.co/200x220?text=No+Image"
                        }
                        drinkImg.width = 200
                        drinkImg.height = 220
                        drinkImg.style.objectFit = "cover"
                        drinkImg.style.borderRadius = "10px"
                        mojd.appendChild(drinkImg)
                    })
                })
                .catch((err) => console.error(err))
        </script> 
    </body>
</html>
